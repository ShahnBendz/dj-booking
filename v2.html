<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahn Bendz | DJ & Producer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff00ff;
    --cyan: #00ffff;
    --mx: 50vw;
    --my: 50vh;
  }

  body {
    background: #060608;
    font-family: 'Space Grotesk', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }

  /* ── SPOTLIGHT ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(700px circle at var(--mx) var(--my), rgba(255,0,255,0.055), transparent 55%);
    pointer-events: none;
    z-index: 1;
    transition: background 0.1s;
  }

  /* ── SCANLINES ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 998;
  }

  /* ── AURORA BLOBS ── */
  .aurora {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0;
    pointer-events: none;
    z-index: 0;
    transition: opacity 2s ease;
  }
  .aurora.visible { opacity: 1; }
  .a1 {
    width: 700px; height: 700px;
    background: radial-gradient(circle, #ff00ff22, transparent 70%);
    top: -200px; left: -100px;
    animation: drift1 14s infinite alternate ease-in-out;
  }
  .a2 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #00ffff18, transparent 70%);
    bottom: -150px; right: -100px;
    animation: drift2 18s infinite alternate ease-in-out;
  }
  .a3 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #aa00ff15, transparent 70%);
    top: 40%; left: 40%;
    animation: drift3 22s infinite alternate ease-in-out;
  }

  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(120px, 80px) scale(1.15); }
  }
  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(-80px, -100px) scale(1.2); }
  }
  @keyframes drift3 {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(60px, -80px) scale(0.9); }
  }

  /* ── CANVAS ── */
  canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* ── OVERLAY ── */
  #overlay {
    position: fixed;
    inset: 0;
    background: #060608;
    z-index: 900;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    transition: opacity 1.2s ease;
  }

  .overlay-name {
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #fff;
    text-transform: uppercase;
    text-shadow: 0 0 60px rgba(255,0,255,0.6);
  }

  .overlay-sub {
    font-size: 0.75rem;
    font-weight: 300;
    color: #444;
    letter-spacing: 0.5em;
    text-transform: uppercase;
  }

  #enter-btn {
    padding: 14px 56px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid rgba(255,0,255,0.4);
    color: rgba(255,0,255,0.8);
    cursor: pointer;
    border-radius: 100px;
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
  }
  #enter-btn:hover {
    border-color: #ff00ff;
    color: #ff00ff;
    box-shadow: 0 0 30px rgba(255,0,255,0.25), inset 0 0 20px rgba(255,0,255,0.05);
  }

  /* ── GLASS CARD ── */
  #main {
    position: relative;
    z-index: 10;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .glass-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: clamp(40px, 6vw, 70px) clamp(50px, 8vw, 100px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
  }

  /* ── REVEAL ANIMATION ── */
  .reveal {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.9s ease, transform 0.9s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .dj-label {
    font-size: 0.7rem;
    font-weight: 300;
    color: #00ffff;
    letter-spacing: 0.6em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  h1 {
    font-size: clamp(3rem, 9vw, 7rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 0 80px rgba(255,0,255,0.5);
  }

  .tagline {
    font-size: 0.72rem;
    font-weight: 300;
    color: #555;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  .divider {
    width: 160px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,0,255,0.5), rgba(0,255,255,0.5), transparent);
  }

  .question {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    font-weight: 300;
    color: #888;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ── BUTTONS ── */
  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 8px;
  }

  .btn {
    padding: 14px 44px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    transition: box-shadow 0.3s, transform 0.2s;
  }

  #yes-btn {
    background: #ff00ff;
    color: #fff;
    box-shadow: 0 0 24px rgba(255,0,255,0.5);
  }

  #no-btn {
    background: #ff00ff;
    color: #fff;
    box-shadow: 0 0 24px rgba(255,0,255,0.5);
  }
  #no-btn.running {
    position: fixed;
    z-index: 20;
    transition: none;
  }

  /* ── SUCCESS ── */
  #success {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .success-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: clamp(40px, 6vw, 70px) clamp(50px, 8vw, 100px);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    text-align: center;
    animation: riseIn 0.8s ease forwards;
  }

  .success-card h2 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.06em;
    text-shadow: 0 0 60px rgba(255,0,255,0.6);
  }

  .success-card .sub {
    font-size: 0.72rem;
    font-weight: 300;
    color: #555;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  .success-card .contact {
    font-size: 1rem;
    font-weight: 400;
    color: #00ffff;
    letter-spacing: 0.15em;
    opacity: 0.85;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Aurora blobs -->
<div class="aurora a1"></div>
<div class="aurora a2"></div>
<div class="aurora a3"></div>

<canvas id="fw"></canvas>

<!-- Overlay -->
<div id="overlay">
  <p class="overlay-name">Shahn Bendz</p>
  <p class="overlay-sub">DJ &nbsp;·&nbsp; Producer &nbsp;·&nbsp; Performer</p>
  <button id="enter-btn" onclick="startExperience()">Enter</button>
</div>

<!-- Main -->
<div id="main">
  <div class="glass-card">
    <div class="dj-label reveal">DJ &nbsp;·&nbsp; Producer &nbsp;·&nbsp; Performer</div>
    <h1 class="reveal">Shahn Bendz</h1>
    <p class="tagline reveal">Available for bookings worldwide</p>
    <div class="divider reveal"></div>
    <p class="question reveal">Looking to book for your event?</p>
    <div class="buttons reveal">
      <button class="btn" id="yes-btn" onclick="bookYes()">Book Now</button>
      <button class="btn" id="no-btn">No</button>
    </div>
  </div>
</div>

<!-- Success -->
<div id="success">
  <div class="success-card">
    <p class="sub">Booking Enquiry</p>
    <h2>Let's Make It Happen</h2>
    <div class="divider"></div>
    <p class="sub">Get in touch to lock in your date</p>
    <p class="contact">shahnbendz@gmail.com</p>
  </div>
</div>

<script>
// ─── SPOTLIGHT ───────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  document.body.style.setProperty('--mx', e.clientX + 'px');
  document.body.style.setProperty('--my', e.clientY + 'px');
});

// ─── AUDIO ───────────────────────────────────────────────
const track = new Audio('Shahn Bendz - Pentada Funk V5.wav');
track.loop  = true;

// ─── FIREWORKS ───────────────────────────────────────────
const canvas = document.getElementById('fw');
const ctx    = canvas.getContext('2d');
const COLS   = ['#ff00ff','#00ffff','#ffff00','#ff6600','#00ff88','#ff0066','#aa00ff'];
let   parts  = [];

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

class Spark {
  constructor(x, y, col) {
    this.x = x; this.y = y; this.col = col;
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 5 + 1.5;
    this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
    this.alpha = 1; this.r = Math.random() * 2 + 1; this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 6) this.trail.shift();
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.1; this.vx *= 0.99;
    this.alpha -= 0.014;
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      ctx.save();
      ctx.globalAlpha = (i / this.trail.length) * this.alpha * 0.4;
      ctx.fillStyle = this.col;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.r * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.col;
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.col;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function explode(x, y, count = 70) {
  const col = COLS[Math.floor(Math.random() * COLS.length)];
  for (let i = 0; i < count; i++) parts.push(new Spark(x, y, col));
}

function fwLoop() {
  ctx.fillStyle = 'rgba(6,6,8,0.2)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let i = parts.length - 1; i >= 0; i--) {
    parts[i].update(); parts[i].draw();
    if (parts[i].alpha <= 0) parts.splice(i, 1);
  }
  requestAnimationFrame(fwLoop);
}

function launchLoop() {
  explode(Math.random() * canvas.width, Math.random() * canvas.height * 0.7);
  setTimeout(launchLoop, Math.random() * 900 + 500);
}

// ─── MAGNETIC YES BUTTON ─────────────────────────────────
const yesBtn = document.getElementById('yes-btn');

yesBtn.addEventListener('mousemove', (e) => {
  const r  = yesBtn.getBoundingClientRect();
  const dx = (e.clientX - (r.left + r.width  / 2)) * 0.28;
  const dy = (e.clientY - (r.top  + r.height / 2)) * 0.28;
  yesBtn.style.transform = `translate(${dx}px, ${dy}px) scale(1.05)`;
  yesBtn.style.boxShadow = `0 0 40px rgba(255,0,255,0.7)`;
});
yesBtn.addEventListener('mouseleave', () => {
  yesBtn.style.transform = '';
  yesBtn.style.boxShadow = '';
});

// ─── NO BUTTON ───────────────────────────────────────────
const noBtn = document.getElementById('no-btn');

function runAway() {
  if (!noBtn.classList.contains('running')) {
    const r = noBtn.getBoundingClientRect();
    // Move button out of the glass card to body so position:fixed works correctly
    document.body.appendChild(noBtn);
    noBtn.classList.add('running');
    noBtn.style.left = r.left + 'px';
    noBtn.style.top  = r.top  + 'px';
  }

  const w   = noBtn.offsetWidth;
  const h   = noBtn.offsetHeight;
  const pad = 40;
  const x   = pad + Math.random() * (innerWidth  - w - pad * 2);
  const y   = pad + Math.random() * (innerHeight - h - pad * 2);
  noBtn.style.left = x + 'px';
  noBtn.style.top  = y + 'px';
}

noBtn.addEventListener('mouseenter', runAway);

// ─── YES BUTTON ──────────────────────────────────────────
function bookYes() {
  document.getElementById('main').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('main').style.display = 'none';
    document.getElementById('success').style.display = 'flex';
  }, 600);
  for (let i = 0; i < 20; i++) {
    setTimeout(() => explode(Math.random() * canvas.width, Math.random() * canvas.height), i * 120);
  }
}

// ─── STAGGERED REVEAL ────────────────────────────────────
function revealElements() {
  const els = document.querySelectorAll('.reveal');
  els.forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), i * 160);
  });
}

// ─── START ───────────────────────────────────────────────
function startExperience() {
  const overlay = document.getElementById('overlay');
  const main    = document.getElementById('main');
  track.play();
  fwLoop();
  launchLoop();
  document.querySelectorAll('.aurora').forEach(a => a.classList.add('visible'));
  overlay.style.opacity = '0';
  setTimeout(() => {
    overlay.style.display = 'none';
    main.style.opacity = '1';
    revealElements();
  }, 1200);
}
</script>
</body>
</html>
